# cargo-audit configuration
# https://github.com/rustsec/rustsec/tree/main/cargo-audit

# All vulnerabilities below are transitive dependencies of the Solana SDK
# (solana-sdk 2.2.1, solana-client 2.3.13) and cannot be upgraded without
# Solana releasing new versions. They are tracked here for visibility.

[advisories]
# --- Vulnerabilities (transitive via Solana SDK) ---

# RUSTSEC-2024-0344: Timing variability in curve25519-dalek Scalar29::sub
# Transitive via: ed25519-dalek 1.0.1 -> solana-keypair -> solana-sdk
# Fix: upgrade curve25519-dalek to >=4.1.3 (blocked by Solana)
ignore = ["RUSTSEC-2024-0344"]

# RUSTSEC-2022-0093: Double Public Key Signing Function Oracle Attack on ed25519-dalek
# Transitive via: ed25519-dalek-bip32 -> solana-keypair -> solana-sdk
# Fix: upgrade ed25519-dalek to >=2 (blocked by Solana)
ignore = ["RUSTSEC-2022-0093"]

# RUSTSEC-2026-0104: Reachable panic in rustls-webpki CRL parsing
# Transitive via: rustls 0.21 -> tokio-tungstenite -> solana-pubsub-client -> solana-client
# Fix: upgrade rustls-webpki to >=0.103.13 (blocked by rustls 0.21 pin)
ignore = ["RUSTSEC-2026-0104"]

# RUSTSEC-2026-0098: Name constraints for URI names incorrectly accepted in rustls-webpki
# Transitive via: same as above
ignore = ["RUSTSEC-2026-0098"]

# RUSTSEC-2026-0099: Name constraints accepted for wildcard certs in rustls-webpki
# Transitive via: same as above
ignore = ["RUSTSEC-2026-0099"]

# --- Unmaintained crates (transitive, warnings only) ---

# RUSTSEC-2024-0375: atty is unmaintained
# Transitive via: solana-cli / clap
ignore = ["RUSTSEC-2024-0375"]

# RUSTSEC-2025-0141: bincode is unmaintained
# Transitive via: solana-sdk
ignore = ["RUSTSEC-2025-0141"]

# RUSTSEC-2024-0388: derivative is unmaintained
# Transitive via: solana-sdk
ignore = ["RUSTSEC-2024-0388"]

# RUSTSEC-2025-0057: fxhash is unmaintained
# Transitive via: solana-sdk
ignore = ["RUSTSEC-2025-0057"]

# RUSTSEC-2024-0384: instant is unmaintained
# Transitive via: solana-sdk
ignore = ["RUSTSEC-2024-0384"]

# RUSTSEC-2025-0161: libsecp256k1 is unmaintained
# Transitive via: solana-sdk
ignore = ["RUSTSEC-2025-0161"]

# RUSTSEC-2025-0119: number_prefix is unmaintained
# Transitive via: solana-cli
ignore = ["RUSTSEC-2025-0119"]

# RUSTSEC-2024-0436: paste is unmaintained
# Transitive via: solana-sdk
ignore = ["RUSTSEC-2024-0436"]

# --- Unsound crates (transitive, warnings only) ---

# RUSTSEC-2021-0145: atty potential unaligned read
# Transitive via: solana-cli / clap
ignore = ["RUSTSEC-2021-0145"]

# RUSTSEC-2026-0186: memmap2 unchecked pointer offset
# Transitive via: solana-genesis-config -> solana-sdk
ignore = ["RUSTSEC-2026-0186"]

# RUSTSEC-2026-0097: rand unsound with custom logger
# Transitive via: solana-keypair -> solana-sdk
ignore = ["RUSTSEC-2026-0097"]
