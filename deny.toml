# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# All advisories below are transitive dependencies of the Solana SDK
# (solana-sdk 2.2.1, solana-client 2.3.13) and cannot be upgraded without
# Solana releasing new versions.

ignore = [
    # --- Vulnerabilities (transitive via Solana SDK) ---

    # RUSTSEC-2024-0344: Timing variability in curve25519-dalek Scalar29::sub
    # Via: ed25519-dalek 1.0.1 -> solana-keypair -> solana-sdk
    "RUSTSEC-2024-0344",

    # RUSTSEC-2022-0093: Double Public Key Signing Function Oracle Attack on ed25519-dalek
    # Via: ed25519-dalek-bip32 -> solana-keypair -> solana-sdk
    "RUSTSEC-2022-0093",

    # RUSTSEC-2026-0104: Reachable panic in rustls-webpki CRL parsing
    # Via: rustls 0.21 -> tokio-tungstenite -> solana-pubsub-client -> solana-client
    "RUSTSEC-2026-0104",

    # RUSTSEC-2026-0098: Name constraints for URI names incorrectly accepted in rustls-webpki
    "RUSTSEC-2026-0098",

    # RUSTSEC-2026-0099: Name constraints accepted for wildcard certs in rustls-webpki
    "RUSTSEC-2026-0099",

    # --- Unmaintained crates (transitive, warnings only) ---

    # RUSTSEC-2024-0375: atty is unmaintained (via solana-cli / clap)
    "RUSTSEC-2024-0375",

    # RUSTSEC-2025-0141: bincode is unmaintained (via solana-sdk)
    "RUSTSEC-2025-0141",

    # RUSTSEC-2024-0388: derivative is unmaintained (via solana-sdk)
    "RUSTSEC-2024-0388",

    # RUSTSEC-2025-0057: fxhash is unmaintained (via solana-sdk)
    "RUSTSEC-2025-0057",

    # RUSTSEC-2024-0384: instant is unmaintained (via solana-sdk)
    "RUSTSEC-2024-0384",

    # RUSTSEC-2025-0161: libsecp256k1 is unmaintained (via solana-sdk)
    "RUSTSEC-2025-0161",

    # RUSTSEC-2025-0119: number_prefix is unmaintained (via solana-cli)
    "RUSTSEC-2025-0119",

    # RUSTSEC-2024-0436: paste is unmaintained (via solana-sdk)
    "RUSTSEC-2024-0436",

    # --- Unsound crates (transitive, warnings only) ---

    # RUSTSEC-2021-0145: atty potential unaligned read (via solana-cli / clap)
    "RUSTSEC-2021-0145",

    # RUSTSEC-2026-0186: memmap2 unchecked pointer offset (via solana-genesis-config -> solana-sdk)
    "RUSTSEC-2026-0186",

    # RUSTSEC-2026-0097: rand unsound with custom logger (via solana-keypair -> solana-sdk)
    "RUSTSEC-2026-0097",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
